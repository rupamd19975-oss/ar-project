<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="targetItem" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <script>
      const target = document.querySelector('#targetItem');
      
      // This is the trigger: when the image is detected...
      target.addEventListener("targetFound", () => {
          // ...immediately go to your music or website
          window.location.replace("https://youtu.be/nDjloeIB3Pc?si=9x3z4MHTNsxSU9Df");
      });
    </script>
</body>
</html>
