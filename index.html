<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* This makes the "scanning" message look nice */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); color: white;
        display: flex; align-items: center; justify-content: center;
        z-index: 99; font-family: sans-serif; pointer-events: none;
      }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      cursor="rayOrigin: mouse"
      raycaster="objects: .clickable">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-plane id="play-button" 
                 class="clickable"
                 color="#FF0000" 
                 width="0.8" height="0.3" 
                 position="0 0 0.1"
                 onclick="window.open('https://www.youtube.com/watch?v=YOUR_VIDEO_ID', '_blank')">
          
          <a-text value="PLAY VIDEO" align="center" color="white" width="3"></a-text>
        </a-plane>

      </a-entity>
    </a-scene>

  </body>
</html>
